spring.application.name=fastbuy

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}

# Directorio donde se guardaran las imagenes
app.upload.dir=${APP_UPLOAD_DIR:uploads/images}

# OpenAI Configuration
openai.api.key=${OPENAI_API_KEY}
# File Size limits para subida de imagenes (por defecto Spring da error en +1MB)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# n8n Configuration
n8n.webhook.url=${N8N_WEBHOOK_URL}
n8n.api.token=${N8N_API_TOKEN}
